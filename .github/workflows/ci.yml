name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env: #GLOBALES
  NOVE_VERSION: "20"
  APP_NAME: cron-ticker-v2

jobs:
  build:
    runs-on: ubuntu-latest
  
    env: #Job build
      BUILD_DIR: dist

    steps:
        - uses: actions/checkout@v4

        - name: Show local variables
          run: |
           echo "App: ${{env.APP_NAME}}, Node: ${{env.NODE_VERSION}}"

        - name: Show Github variables
          run: |
           echo "App: ${{vars.APP_VERSION}}"

        - name: Show Github secrets
          run: |
           echo "Secret: ${{secrets.API_KEY}}"

        - name: Build
          run: npm run build
          env:
              APP_VERSION: ${{vars.APP_VERSION}}