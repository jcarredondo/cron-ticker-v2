name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
workflow_dispatch:

jobs:
  run-tests:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cade
        uses: actions/checkout@v4

      - name: Setuo Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '22.21.1'

      - name: Install Dependence
        run: npm ci

      - name: Run Tests
        run: npm test