name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env: #GLOBALES
  NOVE_VERSION: "20"
  APP_NAME: cron-ticker-v2

jobs:
  # -------- JOB 1 LINT ----------
    lint:
      name: Lint
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: ${{env.NODE_VERSION}}
            cache: 'npm'
        - run: npm ci
        - run: npm run lint
  # -------- JOB 2 TEST ----------
    test:
      name: Tests
      runs-on: ubuntu-latest
      needs: lint
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: ${{env.NODE_VERSION}}
            cache: 'npm'
        - run: npm ci
        - name: Run tests with coverage
          run: npm run test:coverage

  # -------- JOB BUILD -----------
    build:
      name: Build
      runs-on: ubuntu-latest
      needs: test
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: ${{env.NODE_VERSION}}
            cache: 'npm'
        - run: npm ci
        - run: npm run build